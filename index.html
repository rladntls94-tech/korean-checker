<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한국어 검사 툴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    textarea {
      width: 100%;
      height: 200px;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      padding: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #4f7ef8; }

    .drop-zone {
      border: 2px dashed #c5cad6;
      border-radius: 7px;
      padding: 24px;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      background: #f0f4ff;
      border-color: #4f7ef8;
    }
    .drop-zone input[type="file"] { display: none; }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      padding: 10px 24px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    #btnCheck  { background: #4f7ef8; color: #fff; }
    #btnClear  { background: #eef0f5; color: #555; }

    /* ---- results ---- */
    #results { display: none; }

    .badge-ok {
      display: inline-block;
      background: #e6f9ed;
      color: #1d8348;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-warn {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .result-header h2 { margin-bottom: 0; }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .result-table th {
      background: #f4f6f9;
      text-align: left;
      padding: 8px 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #e0e4ed;
    }
    .result-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #eef0f5;
      vertical-align: top;
    }
    .result-table tr:last-child td { border-bottom: none; }
    .result-table tr:hover td { background: #f9fafe; }

    .line-num {
      font-weight: 700;
      color: #4f7ef8;
      white-space: nowrap;
    }

    .line-content {
      font-family: 'Consolas', 'Courier New', 'DejaVu Sans Mono', monospace;
      word-break: break-all;
    }

    .ko-highlight {
      background: #ffeaa7;
      border-radius: 3px;
      padding: 1px 3px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .tag {
      background: #eef2ff;
      color: #3a56d4;
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 0.82rem;
    }

    .max-width {
      max-width: 860px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div class="max-width">
  <h1>한국어 검사 툴</h1>
  <p class="subtitle">공지사항 번역 후 남아 있는 한국어를 찾아줍니다.</p>

  <div class="card">
    <h2>텍스트 직접 입력</h2>
    <textarea id="inputText" placeholder="번역된 공지사항 텍스트를 여기에 붙여넣으세요..."></textarea>
  </div>

  <div class="card">
    <h2>파일 업로드 (.txt / .md / .csv 등)</h2>
    <div class="drop-zone" id="dropZone">
      <div class="icon">📂</div>
      <div>파일을 여기로 끌어오거나 클릭해서 선택하세요</div>
      <input type="file" id="fileInput" accept=".txt,.md,.csv,.json,.html,.xml,.log" />
    </div>
  </div>

  <div class="btn-row">
    <button id="btnCheck">검사하기</button>
    <button id="btnClear">초기화</button>
  </div>

  <!-- results -->
  <div id="results" class="card" style="margin-top:24px;">
    <div class="result-header">
      <h2>검사 결과</h2>
      <span id="badge"></span>
    </div>
    <div id="resultBody"></div>
  </div>
</div>

<script>
  const KOREAN = /[ᄀ-ᇿ㄰-㆏ꥠ-꥿가-힣ힰ-퟿]+/g;

  const inputText = document.getElementById('inputText');
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const results   = document.getElementById('results');
  const badge     = document.getElementById('badge');
  const resultBody = document.getElementById('resultBody');

  // ── file upload ──────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) readFile(fileInput.files[0]);
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const bytes = new Uint8Array(e.target.result);
      let text = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
      if (text.includes('�')) {
        text = new TextDecoder('windows-1252').decode(bytes);
      }
      inputText.value = text;
    };
    reader.readAsArrayBuffer(file);
  }

  // ── check ─────────────────────────────────────────────────
  document.getElementById('btnCheck').addEventListener('click', () => {
    const text = inputText.value;
    if (!text.trim()) { alert('텍스트를 입력하거나 파일을 업로드해주세요.'); return; }
    analyse(text);
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    inputText.value = '';
    fileInput.value = '';
    results.style.display = 'none';
    dropZone.querySelector('div:last-of-type').textContent = '파일을 여기로 끌어오거나 클릭해서 선택하세요';
  });

  function analyse(text) {
    const lines = text.split('\n');
    const found = [];
    const allKorean = [];

    lines.forEach((line, idx) => {
      const matches = [...line.matchAll(KOREAN)].map(m => m[0]);
      if (matches.length) {
        found.push({ lineNum: idx + 1, content: line, matches });
        allKorean.push(...matches);
      }
    });

    results.style.display = 'block';

    if (found.length === 0) {
      badge.outerHTML = '<span id="badge" class="badge-ok">한국어 없음</span>';
      resultBody.innerHTML = '<p style="color:#1d8348;font-size:0.9rem;">한국어가 발견되지 않았습니다.</p>';
      return;
    }

    // badge 갱신
    const newBadge = document.createElement('span');
    newBadge.id = 'badge';
    newBadge.className = 'badge-warn';
    newBadge.textContent = `${found.length}줄에서 발견`;
    badge.replaceWith(newBadge);

    // 표 생성
    let html = `
      <table class="result-table">
        <thead>
          <tr>
            <th style="width:64px;">줄</th>
            <th>내용 (한국어 강조)</th>
            <th>발견된 한국어</th>
          </tr>
        </thead>
        <tbody>`;

    found.forEach(r => {
      const highlighted = escapeHtml(r.content).replace(
        /[ᄀ-ᇿ㄰-㆏ꥠ-꥿가-힣ힰ-퟿]+/gu,
        m => `<mark class="ko-highlight">${m}</mark>`
      );
      const tags = r.matches.map(m => `<span class="tag">${escapeHtml(m)}</span>`).join('');
      html += `
        <tr>
          <td class="line-num">${r.lineNum}</td>
          <td class="line-content">${highlighted}</td>
          <td><div class="tag-list">${tags}</div></td>
        </tr>`;
    });

    html += `</tbody></table>`;

    // 전체 한국어 목록
    const unique = [...new Set(allKorean)];
    html += `
      <div style="margin-top:16px;">
        <div style="font-size:0.82rem;font-weight:600;color:#555;margin-bottom:8px;">전체 발견 목록</div>
        <div class="tag-list">${unique.map(w => `<span class="tag">${escapeHtml(w)}</span>`).join('')}</div>
      </div>`;

    resultBody.innerHTML = html;
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
