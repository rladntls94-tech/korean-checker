<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검은사막 콘솔 운영툴</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📅</text></svg>">
  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --event:#4f7ef8;
      --pearl:#8E24AA;
      --update:#2E7D32;
      --ops:#E64A19;
      --issue:#D32F2F;
      --etc:#607D8B;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .lang-select-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .lang-select-row label { font-size: 0.9rem; font-weight: 600; color: #444; white-space: nowrap; }

    select {
      padding: 8px 14px;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      background: #fff;
      transition: border-color 0.2s;
    }
    select:focus { border-color: #4f7ef8; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: #555; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    textarea {
      width: 100%;
      height: 200px;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      padding: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #4f7ef8; }

    .drop-zone {
      border: 2px dashed #c5cad6;
      border-radius: 7px;
      padding: 24px;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over { background: #f0f4ff; border-color: #4f7ef8; }
    .drop-zone input[type="file"] { display: none; }
    .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }

    .btn-row { display: flex; gap: 10px; margin-top: 16px; }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #btnCheck { background: #4f7ef8; color: #fff; }
    #btnClear { background: #eef0f5; color: #555; }

    #results { display: none; }

    .badge-ok {
      display: inline-block;
      background: #e6f9ed;
      color: #1d8348;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge-warn {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .result-header h2 { margin-bottom: 0; }

    .result-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
    .result-table th {
      background: #f4f6f9;
      text-align: left;
      padding: 8px 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #e0e4ed;
      white-space: nowrap;
      overflow: hidden;
    }
    .result-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #eef0f5;
      vertical-align: top;
      overflow: hidden;
    }
    .result-table tr:last-child td { border-bottom: none; }
    .result-table tr:hover td { background: #f9fafe; }
    .count-badge { font-size: 0.7rem; color: #888; margin-left: 2px; }

    @keyframes tokenFlash {
      0%   { box-shadow: none; }
      25%  { box-shadow: 0 0 0 3px #e63946, 0 0 12px rgba(230,57,70,0.7); }
      65%  { box-shadow: 0 0 0 3px #e63946, 0 0 12px rgba(230,57,70,0.7); }
      100% { box-shadow: none; }
    }
    .token-flash { animation: tokenFlash 1s ease; position: relative; z-index: 1; }
    .token-dim   { opacity: 0.2; transition: opacity 0.15s; }
    .tag-clickable { cursor: pointer; }
    .tag-clickable:hover { filter: brightness(0.85); }

    .line-num { font-weight: 700; color: #4f7ef8; white-space: nowrap; }
    .line-content { font-family: 'Consolas', 'Courier New', 'DejaVu Sans Mono', monospace; word-break: break-all; line-height: 2.2; }
    .html-notice { font-size: 0.78rem; color: #4f7ef8; margin-bottom: 12px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { border-radius: 5px; padding: 3px 10px; font-size: 0.82rem; }

    .summary-section { margin-top: 20px; }
    .summary-script-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #444;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .summary-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
    .summary-group { margin-bottom: 14px; }

    .max-width { max-width: 860px; margin: 0 auto; }

    .deploy-info {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 0.72rem;
      color: #aaa;
    }

    /* ── Tool header / tab nav ───────────────────────────────── */
    .tool-header { margin-bottom: 20px; }
    .tab-nav {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid #e0e4ed;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-size: 0.92rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      opacity: 1;
    }
    .tab-btn:hover { color: #4f7ef8; opacity: 1; }
    .tab-btn.active { color: #4f7ef8; border-bottom-color: #4f7ef8; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Schedule tab ─────────────────────────────────────────── */
    .sched-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .sched-table th {
      font-size: 12px;
      color: #888;
      font-weight: 600;
      padding: 6px 2px;
      text-align: left;
    }
    .sched-th-sun { color: #e53935; }
    .sched-th-sat { color: #1e88e5; }
    .sched-table td {
      vertical-align: top;
      border: 1px solid #eee;
      height: 96px;
      padding: 4px;
      font-size: 11px;
      position: relative;
    }
    .sched-empty { background: #fafafa; border: 1px solid #f2f2f2 !important; }
    .sched-today { background: #fff9e6; border: 2px solid #ffca28 !important; }
    .sched-daynum-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .sched-daynum {
      font-size: 12px;
      font-weight: 700;
      color: #444;
      display: block;
    }
    .sched-sun-num { color: #e53935; }
    .sched-sat-num { color: #1e88e5; }
    .sched-add-btn {
      border: none;
      background: transparent;
      color: #bbb;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .sched-table td:hover .sched-add-btn { opacity: 1; }
    .sched-add-btn:hover { color: #4f7ef8; }
    .sched-badge {
      display: block;
      margin-bottom: 2px;
      padding: 2px 4px;
      border-radius: 4px;
      color: #fff;
      font-size: 10px;
      line-height: 1.3;
      white-space: normal;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .sched-badge:hover { opacity: 0.8; text-decoration: underline; }
    .sched-badge:active { transform: scale(0.97); }
    .sched-badge-plain { cursor: grab; }
    .sched-badge-plain:hover { opacity: 1; text-decoration: none; }
    .sched-badge-plain:active { cursor: grabbing; }
    .sched-badge.dragging { opacity: 0.4; }
    .sched-table td.sched-drop-target { background: #eef3ff; }
    .sched-maint-tag {
      display: inline-block;
      background: #fff3f3;
      color: #d32f2f;
      border: 1px solid #d32f2f;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      line-height: 1.4;
      padding: 0 4px;
      margin-bottom: 2px;
    }
    .sched-today-tag {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 9px;
      background: #ffca28;
      color: #5c4400;
      padding: 1px 5px;
      border-radius: 8px;
      font-weight: 700;
      z-index: 1;
      pointer-events: none;
    }
    .sched-more-btn {
      display: block;
      width: 100%;
      border: none;
      background: #eef1f7;
      color: #556;
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
      padding: 2px 4px;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .sched-more-btn:hover { background: #e0e6f5; color: #4f7ef8; }
    .sched-cat-legend { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 12px; }
    .sched-cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: #fff;
      color: #555;
      cursor: pointer;
      user-select: none;
    }
    .sched-cat-chip .dot { width: 9px; height: 9px; border-radius: 2px; }
    .sched-cat-chip.inactive { opacity: 0.35; }
    .sched-cat-chip:hover { border-color: #4f7ef8; color: #4f7ef8; }
    .sched-search { display: flex; align-items: center; gap: 6px; margin: 0 0 8px; }
    .sched-search input {
      flex: 0 1 280px;
      padding: 6px 10px;
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      font-size: 13px;
    }
    .sched-search input:focus { outline: none; border-color: #4f7ef8; }
    .sched-search button { border: none; background: transparent; color: #999; cursor: pointer; font-size: 13px; display: none; }
    .sched-search button:hover { color: #d32f2f; }
    .sched-search-count { font-size: 12px; color: #4f7ef8; font-weight: 600; }
    .sched-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .sched-toolbar button, .sched-sync-btns button {
      border: 1px solid #d0d7e2;
      background: #fff;
      color: #445;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .sched-toolbar button:hover, .sched-sync-btns button:hover { background: #f0f4ff; border-color: #4f7ef8; color: #4f7ef8; }
    .sched-sync { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e7f0; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; }
    .sched-sync-status { font-size: 12px; color: #667; font-weight: 600; }
    .sched-sync-status[data-state="ok"] { color: #2e7d32; }
    .sched-sync-status[data-state="error"] { color: #d32f2f; }
    .sched-sync-status[data-state="saving"], .sched-sync-status[data-state="connecting"] { color: #4f7ef8; }
    .sched-sync-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-left: auto; }
    .sched-summary-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 5px 2px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      font-size: 13px;
    }
    .sched-summary-row:last-of-type { border-bottom: none; }
    .sched-summary-row:hover { background: #f8faff; }
    .sched-summary-date { flex-shrink: 0; font-weight: 700; color: #444; width: 64px; font-size: 12px; }
    .sched-summary-date.is-today { color: #e6a700; }
    .sched-summary-row .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; color: #fff; flex-shrink: 0; }
    .sched-summary-title.done { text-decoration: line-through; color: #aaa; }
    .sched-summary-empty { color: #999; font-size: 13px; padding: 4px 0; }
    .sched-summary-maint { font-size: 12px; color: #d32f2f; margin-top: 8px; font-weight: 600; }
    .deploy-update-warn { color: #d32f2f; font-weight: 700; margin-left: 8px; cursor: pointer; text-decoration: underline; }
    .sched-month h2 {
      font-size: 15px;
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eee;
      text-transform: none;
      letter-spacing: normal;
      color: #333;
    }
    .sched-note { font-size: 12px; color: #888; margin-top: 8px; }
    .board-link { color: #4f7ef8; text-decoration: none; }
    .board-link:hover { text-decoration: underline; }

    /* ── 일정 상세 보기 모달 (달력 배지 더블클릭) ─────────────── */
    .event-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .event-detail-box {
      position: relative;
      background: #fff;
      border-radius: 10px;
      padding: 22px 26px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 28px rgba(0,0,0,0.22);
    }
    .event-detail-close {
      position: absolute;
      top: 6px;
      right: 10px;
      border: none;
      background: transparent;
      font-size: 22px;
      line-height: 1;
      color: #aaa;
      cursor: pointer;
    }
    .event-detail-close:hover { color: #333; }
    .event-detail-date { font-size: 0.8rem; color: #888; font-weight: 700; margin-bottom: 8px; }
    .event-detail-tag { display: inline-block; border-radius: 5px; padding: 3px 10px; font-size: 0.78rem; color: #fff; margin-bottom: 10px; }
    .event-detail-box h3 { margin: 0 0 10px; font-size: 1.05rem; color: #222; }
    .event-detail-box h3.event-detail-title-done { text-decoration: line-through; opacity: 0.5; }
    .event-detail-box p { margin: 0 0 14px; font-size: 0.9rem; line-height: 1.5; color: #444; white-space: pre-wrap; }
    .event-detail-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed #e0e4ed;
    }
    .event-detail-done-row { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; color: #444; cursor: pointer; }
    .event-detail-done-row input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }
    .event-detail-edit-btn {
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      background: #fff;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #4f7ef8;
      cursor: pointer;
      flex-shrink: 0;
    }
    .event-detail-edit-btn:hover { background: #f0f4ff; }

    .detail-table { table-layout: auto; }
    .detail-table th:nth-child(1), .detail-table td:nth-child(1),
    .detail-table th:nth-child(2), .detail-table td:nth-child(2),
    .detail-table th:nth-child(3), .detail-table td:nth-child(3),
    .detail-table th:nth-child(5), .detail-table td:nth-child(5),
    .detail-table th:nth-child(6), .detail-table td:nth-child(6) {
      white-space: nowrap;
      width: 1%;
    }
    .detail-table th:nth-child(4), .detail-table td:nth-child(4) {
      width: auto;
    }
    .done-cell { text-align: center; vertical-align: middle; }
    .done-checkbox { width: 15px; height: 15px; cursor: pointer; }
    .row-done td:not(.done-cell) { text-decoration: line-through; opacity: 0.5; }
    .sched-badge-done { text-decoration: line-through; opacity: 0.5; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
    }
    .task-item:last-child { margin-bottom: 0; }
    .task-item input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin-top: 1px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-item.task-done { text-decoration: line-through; opacity: 0.5; }

    .sched-pager {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .sched-pager-btn {
      padding: 6px 14px;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4f7ef8;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sched-pager-btn:hover:not(:disabled) { background: #f0f4ff; }
    .sched-pager-btn:disabled { color: #bbb; border-color: #eee; cursor: default; }
    .sched-page-label { font-size: 0.95rem; font-weight: 700; color: #444; min-width: 120px; text-align: center; }

    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px dashed #e0e4ed;
    }
    .add-form input[type="text"],
    .add-form input[type="date"],
    .add-form input[type="url"] {
      padding: 7px 10px;
      border: 1.5px solid #dde1ea;
      border-radius: 7px;
      font-size: 0.82rem;
      font-family: inherit;
      outline: none;
    }
    .add-form input:focus, .add-form select:focus { border-color: #4f7ef8; }
    .add-form select {
      padding: 7px 10px;
      font-size: 0.82rem;
    }
    .add-form-btn {
      padding: 7px 16px;
      border: none;
      border-radius: 7px;
      background: #4f7ef8;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .add-form-btn:hover { opacity: 0.85; }
    .custom-delete-btn {
      background: none;
      border: none;
      color: #e63946;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 2px 6px;
    }
    .custom-delete-btn:hover { text-decoration: underline; }
    .event-edit-btn {
      background: none;
      border: none;
      color: #4f7ef8;
      font-size: 0.78rem;
      cursor: pointer;
      padding: 2px 6px;
    }
    .event-edit-btn:hover { text-decoration: underline; }
    .task-delete-btn {
      background: none;
      border: none;
      color: #e63946;
      font-size: 0.72rem;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .task-delete-btn:hover { text-decoration: underline; }
    .task-edit-btn {
      background: none;
      border: none;
      color: #4f7ef8;
      font-size: 0.72rem;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .task-edit-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="max-width">

  <div class="tool-header">
    <h1>검은사막 콘솔 운영툴</h1>
    <p class="subtitle" id="toolSubtitle">번역 후 잔류하는 불필요한 언어를 찾아줍니다.</p>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="checker">언어 검사</button>
    <button class="tab-btn" data-tab="schedule">콘솔 일정</button>
  </div>

  <!-- ============================================================ -->
  <!-- TAB 1: 언어 검사 툴                                            -->
  <!-- ============================================================ -->
  <div id="tab-checker" class="tab-content active">

    <div class="card">
      <h2>기준 언어 설정</h2>
      <div class="lang-select-row">
        <label>이 문서의 언어:</label>
        <select id="baseLang">
          <option value="korean">한국어</option>
          <option value="japanese">일본어</option>
          <option value="chinese">중국어</option>
          <option value="latin">영어 / 라틴어 (스페인어, 프랑스어 등)</option>
          <option value="arabic">아랍어</option>
          <option value="cyrillic">러시아어</option>
          <option value="thai">태국어</option>
        </select>
      </div>
      <div id="extraAllowWrap" style="margin-top:12px;"></div>
      <div class="legend" id="legend"></div>
    </div>

    <div class="card">

<script>
  // ── Tab switching ──────────────────────────────────────────
  const TAB_SUBTITLES = {
    checker: '번역 후 잔류하는 불필요한 언어를 찾아줍니다.',
    schedule: '검은사막 콘솔 이벤트/업데이트 마감 일정을 한눈에 확인하세요.',
  };
  const toolSubtitle = document.getElementById('toolSubtitle');

  // 콘솔 일정 탭은 비밀번호를 확인한 후에만 열람 가능 (세션 동안만 유지)
  // 비밀번호 원문 대신 SHA-256 해시만 저장 — view-source로 평문이 바로 보이지 않도록 함
  const SCHEDULE_PASSWORD_HASH = 'b070751113ee70c6bb584a0de7ae93cfe5c6f489925bbccfb7ab30c59378df69';
  const SCHEDULE_UNLOCK_KEY = 'bdo-schedule-unlocked';

  async function sha256Hex(text) {
    const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.dataset.tab === 'schedule' && sessionStorage.getItem(SCHEDULE_UNLOCK_KEY) !== 'yes') {
        const input = prompt('비밀번호를 입력하세요:');
        if (input === null) return;
        const hash = await sha256Hex(input);
        if (hash !== SCHEDULE_PASSWORD_HASH) {
          alert('비밀번호가 올바르지 않습니다.');
          return;
        }
        sessionStorage.setItem(SCHEDULE_UNLOCK_KEY, 'yes');
      }
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      toolSubtitle.textContent = TAB_SUBTITLES[btn.dataset.tab] || '';
    });
  });

  // ── Schedule data (single source of truth) ───────────────────
  // 새 일정을 추가할 때는 이 배열에 한 줄만 추가하면 캘린더와
  // 상세 목록 표가 모두 자동으로 갱신됩니다.
  const CATEGORY_META = {
    event:  { label: '이벤트',   color: 'var(--event)' },
    pearl:  { label: '펄상점',   color: 'var(--pearl)' },
    update: { label: '업데이트', color: 'var(--update)' },
    ops:    { label: '운영',     color: 'var(--ops)' },
    issue:  { label: '이슈',     color: 'var(--issue)' },
    etc:    { label: '기타',     color: 'var(--etc)' },
  };
  // 알 수 없는(이전 버전에서 저장된) 카테고리는 '기타'로 안전 처리
  function metaFor(cat) { return CATEGORY_META[cat] || CATEGORY_META.etc; }

  // ── Done-state (체크한 항목은 브라우저에 저장되어 새로고침해도 유지됨) ──
  const DONE_STORAGE_KEY = 'bdo-console-schedule-done';

  function loadDoneSet() {
    try { return new Set(JSON.parse(localStorage.getItem(DONE_STORAGE_KEY) || '[]')); }
    catch { return new Set(); }
  }
  function saveDoneSet(set) { localStorage.setItem(DONE_STORAGE_KEY, JSON.stringify([...set])); onLocalDataChanged(); }
  function eventKey(e) { return e.custom ? `custom__${e.id}` : (e._key || `${e.date}__${e.title}`); }
  function escapeAttr(str) { return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

  let doneSet = loadDoneSet();

  // ── 사용자가 직접 추가하는 일정/업무 (브라우저 localStorage에만 저장됨) ──
  const CUSTOM_EVENTS_KEY = 'bdo-console-schedule-custom-events';
  const CUSTOM_TASKS_KEY = 'bdo-console-schedule-custom-tasks';
  // ── 기존(하드코딩된) 일정/업무를 직접 수정한 내용 (브라우저 localStorage에만 저장됨) ──
  const EVENT_EDITS_KEY = 'bdo-console-schedule-event-edits';
  const TASK_EDITS_KEY = 'bdo-console-schedule-task-edits';

  function loadCustomEvents() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_EVENTS_KEY) || '[]'); }
    catch { return []; }
  }
  function saveCustomEvents(list) { localStorage.setItem(CUSTOM_EVENTS_KEY, JSON.stringify(list)); onLocalDataChanged(); }

  function loadCustomTasks() {
    try { return JSON.parse(localStorage.getItem(CUSTOM_TASKS_KEY) || '[]'); }
    catch { return []; }
  }
  function saveCustomTasks(list) { localStorage.setItem(CUSTOM_TASKS_KEY, JSON.stringify(list)); onLocalDataChanged(); }

  function loadEventEdits() {
    try { return JSON.parse(localStorage.getItem(EVENT_EDITS_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveEventEdits(obj) { localStorage.setItem(EVENT_EDITS_KEY, JSON.stringify(obj)); onLocalDataChanged(); }

  function loadTaskEdits() {
    try { return JSON.parse(localStorage.getItem(TASK_EDITS_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveTaskEdits(obj) { localStorage.setItem(TASK_EDITS_KEY, JSON.stringify(obj)); onLocalDataChanged(); }

  let customEvents = loadCustomEvents();
  let customTasks = loadCustomTasks();
  let eventEdits = loadEventEdits();
  let taskEdits = loadTaskEdits();

  function makeCustomId() { return 'custom-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7); }
  function allEvents() {
    const base = EVENTS.map(e => eventEdits[e._key] ? { ...e, ...eventEdits[e._key] } : e);
    return [...base, ...customEvents];
  }
  function allTasks() {
    const base = TASKS.map(t => taskEdits[t.id] ? { ...t, ...taskEdits[t.id] } : t);
    return [...base, ...customTasks];
  }

  // ── 정기점검일 (날짜 옆에 별도 표시) — 2026-07-09부터 2주 간격 목요일 ──
  const MAINTENANCE_DATES = (() => {
    const set = new Set();
    const d = new Date(Date.UTC(2026, 6, 9));
    while (d.getUTCFullYear() === 2026) {
      set.add(d.toISOString().slice(0, 10));
      d.setUTCDate(d.getUTCDate() + 14);
    }
    return set;
  })();

  // ── 챙겨야 할 업무 (개인 액션 아이템, 체크박스로 완료 표시) ──
  const TASKS = [
    { id: 'heidel-url', text: '하이델 이벤트 응모판 "자세히 보기" 버튼용 라이브 이벤트 페이지 URL 생성 및 전달 필요 (~7/9)' },
    { id: 'heidel-register', text: '응모판 이벤트 실제 안내 시점에 맞춰, 위에서 미리 파둔 링크 슬롯에 실제 URL 등록 필요' },
    { id: 'coupon-setup', text: '7일 쿠폰 이벤트(7/10~7/17) 콘솔 도전과제 세팅 — 쿠폰 보상을 당일(00:00~23:59 UTC) 내에만 수령 가능하도록 구성 필요' },
    { id: 'privacy-dm-check', text: '개인정보처리방침 개정(7/1 안내 → 7/8 갱신) 관련 DM 발송 여부 확인 — 한국은 약관/운영정책 개정이 동반될 경우에만 발송, 대만은 별도 발송 필요' },
    { id: 'academy-notice', text: '올비아 아카데미 2기 졸업 일정 변경(입학종료 7/16→7/23, 졸업 7/23→8/6) 사전 안내 공지 게시 (목표 ~7/9)' },
    { id: 'guild-expo-reward', text: '7/9 정기점검 시 길드 박람회 1차 보상 지급 — 서트에서 테스트 후 운영툴로 지급 (OASIS > Mail > Item-Send > Item Send - Guild)' },
    { id: 'solare-finale-notice', text: '솔라레 시즌 피날레 특별전(우당탕탕 협동 대전, 7/23 업데이트) 관련 공지 준비 (목표 ~7/16, 업데이트 일주일 전)' },
  ];

  function renderTaskList() {
    const container = document.getElementById('taskList');
    container.innerHTML = allTasks().map(t => {
      const key = `task__${t.id}`;
      const isDone = doneSet.has(key);
      const deleteBtn = t.custom
        ? `<button type="button" class="task-delete-btn" data-task-id="${escapeAttr(t.id)}">✕</button>`
        : '';
      return `<label class="task-item${isDone ? ' task-done' : ''}">
        <input type="checkbox" class="task-checkbox" data-key="${escapeAttr(key)}" ${isDone ? 'checked' : ''}>
        <span style="flex:1;">${t.text}</span>
        <button type="button" class="task-edit-btn" data-task-id="${escapeAttr(t.id)}" title="수정">✎</button>
        ${deleteBtn}
      </label>`;
    }).join('');
  }

  document.getElementById('taskList').addEventListener('change', e => {
    const checkbox = e.target.closest('.task-checkbox');
    if (!checkbox) return;
    const key = checkbox.dataset.key;
    if (checkbox.checked) doneSet.add(key); else doneSet.delete(key);
    saveDoneSet(doneSet);
    renderTaskList();
  });

  document.getElementById('taskList').addEventListener('click', e => {
    const editBtn = e.target.closest('.task-edit-btn');
    if (editBtn) {
      e.preventDefault();
      const id = editBtn.dataset.taskId;
      const current = allTasks().find(t => t.id === id);
      if (!current) return;
      const text = prompt('업무 내용 수정:', current.text);
      if (text === null) return;
      const trimmed = text.trim();
      if (!trimmed) return;
      if (current.custom) {
        const idx = customTasks.findIndex(t => t.id === id);
        if (idx !== -1) {
          customTasks[idx] = { ...customTasks[idx], text: trimmed };
          saveCustomTasks(customTasks);
        }
      } else {
        taskEdits[id] = { text: trimmed };
        saveTaskEdits(taskEdits);
      }
      renderTaskList();
      return;
    }
    const btn = e.target.closest('.task-delete-btn');
    if (!btn) return;
    e.preventDefault();
    customTasks = customTasks.filter(t => t.id !== btn.dataset.taskId);
    saveCustomTasks(customTasks);
    renderTaskList();
  });

  document.getElementById('addTaskBtn').addEventListener('click', () => {
    const input = document.getElementById('newTaskText');
    const text = input.value.trim();
    if (!text) return;
    customTasks.push({ id: makeCustomId(), text, custom: true });
    saveCustomTasks(customTasks);
    input.value = '';
    renderTaskList();
  });

  const PEARL_NOTICE = boardNo => `https://blackdesert.pearlabyss.com/Console/ko-KR/News/Notice/Detail?_boardNo=${boardNo}`;
  const PRIVACY_SLACK_THREAD = 'https://pearlabyss-op.slack.com/archives/GALFJM3DJ/p1782881689413629?thread_ts=1782753159.496199&cid=GALFJM3DJ';

  const EVENTS = [
    { date: '2026-07-01', category: 'event',     title: '일일접속보상 시작', url: PEARL_NOTICE(13356) },
    { date: '2026-07-01', category: 'etc',       title: '개인정보처리방침 개정 안내 공지 오픈', url: PRIVACY_SLACK_THREAD },
    { date: '2026-07-02', category: 'event',     title: '솔라레 이벤트의뢰 종료', url: PEARL_NOTICE(13300) },
    { date: '2026-07-02', category: 'event',     title: '솔라레 패스 판매종료', url: PEARL_NOTICE(13299) },
    { date: '2026-07-06', category: 'ops',       title: '연우님과 PERS 관련 확인',
      detail: '붉은사막에 있는 PERS 시스템을 콘솔에서 활용할 수 없을지 확인' },
    { date: '2026-07-06', category: 'event',     title: '패치노트 안내 내용 관련해서 논의',
      detail: '솔라레 시즌 피날레 특별전 "우당탕탕 협동 대전"(7/23 업데이트) 패치노트 안내 내용 관련 논의' },
    { date: '2026-07-07', category: 'event',     title: '길드박람회 카드 최종마감(23:59)', url: PEARL_NOTICE(13306),
      detail: '길드 박람회 소개카드 최종 제출 마감(23:59 UTC, 디스코드 guild-card 채널)' },
    { date: '2026-07-08', category: 'event',     title: '길드가입 이벤트 종료(23:59)', url: PEARL_NOTICE(13302) },
    { date: '2026-07-08', category: 'etc',       title: '개인정보처리방침 개정 갱신', url: PRIVACY_SLACK_THREAD },
    { date: '2026-07-09', category: 'event',     title: '조련지원품 종료', url: PEARL_NOTICE(13354) },
    { date: '2026-07-09', category: 'event',     title: '솔라레 패스 보상수령종료', url: PEARL_NOTICE(13299) },
    { date: '2026-07-09', category: 'event',     title: '솔라레 시즌 종료', url: PEARL_NOTICE(13204),
      detail: '솔라레의 창 랭크전 시즌(5/14~) 종료' },
    { date: '2026-07-09', category: 'event',     title: '하이델 이벤트 응모판 링크 등록', url: PEARL_NOTICE(13383),
      detail: '하이델 이벤트 응모판 UI "자세히 보기" 버튼에 연결할 라이브 이벤트 페이지 URL 생성 후 전달 필요. 응모판 이벤트 안내 시 사전에 파둔 링크 슬롯에 실제 URL을 등록해야 함 (Slack 요청 기준).' },
    { date: '2026-07-09', category: 'event',     title: '길드박람회 1차 보상 지급(정기점검 시)',
      detail: '서트에서 테스트 후 운영툴로 지급. 메뉴: OASIS > Mail > Item-Send > Item Send - Guild' },
    { date: '2026-07-09', category: 'event',     title: 'NA 라이브 쿼리패치 실행(14~15시, 필수)',

  // 화면에 표시할 달. 새 달이 시작되면 이 배열에 한 줄만 추가하면
  // 카드 HTML까지 전부 자동 생성됩니다 (직접 HTML을 편집할 필요 없음).
  const MONTHS = [
    { year: 2026, month: 7 },
    { year: 2026, month: 8 },
    { year: 2026, month: 9 },
    { year: 2026, month: 10 },
    { year: 2026, month: 11 },
    { year: 2026, month: 12 },
  ];
  const MONTHS_PER_PAGE = 2;
  // 접속 시 오늘(KST)이 포함된 페이지를 먼저 보여줌
  let currentPage = (() => {
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
    const [ty, tm] = todayStr.split('-').map(Number);
    const idx = MONTHS.findIndex(m => m.year === ty && m.month === tm);
    return idx === -1 ? 0 : Math.floor(idx / MONTHS_PER_PAGE);
  })();

  // ── 카테고리 필터 (범례 칩 클릭으로 토글, 아무것도 선택 안 하면 전체 표시) ──
  const activeCategories = new Set();
  function categoryVisible(cat) { return activeCategories.size === 0 || activeCategories.has(cat); }

  function renderCategoryLegend() {
    const el = document.getElementById('schedCategoryLegend');
    el.innerHTML = Object.entries(CATEGORY_META).map(([key, meta]) => {
      const inactive = activeCategories.size > 0 && !activeCategories.has(key);
      return `<span class="sched-cat-chip${inactive ? ' inactive' : ''}" data-category="${key}"><span class="dot" style="background:${meta.color}"></span>${meta.label}</span>`;
    }).join('') + (activeCategories.size > 0
      ? '<span class="sched-cat-chip" data-category="__all">✕ 전체 보기</span>' : '');
  }

  document.getElementById('schedCategoryLegend').addEventListener('click', e => {
    const chip = e.target.closest('.sched-cat-chip');
    if (!chip) return;
    const cat = chip.dataset.category;
    if (cat === '__all') activeCategories.clear();
    else if (activeCategories.has(cat)) activeCategories.delete(cat);
    else activeCategories.add(cat);
    renderScheduleCalendars();
    renderScheduleDetailTable();
    highlightToday();
  });

  // ── 일정 검색 (제목·상세 내용 대상, 카테고리 필터와 함께 적용) ──
  let searchQuery = '';
  function matchesSearch(e) {
    if (!searchQuery) return true;
    return `${e.title} ${e.detail || ''}`.toLowerCase().includes(searchQuery);
  }
  function eventVisible(e) { return categoryVisible(e.category) && matchesSearch(e); }

  const schedSearchInput = document.getElementById('schedSearchInput');
  schedSearchInput.addEventListener('input', () => {
    searchQuery = schedSearchInput.value.trim().toLowerCase();
    document.getElementById('schedSearchClear').style.display = searchQuery ? 'inline' : 'none';
    document.getElementById('schedSearchCount').textContent =
      searchQuery ? `${allEvents().filter(eventVisible).length}건` : '';
    renderScheduleCalendars();
    renderScheduleDetailTable();
    highlightToday();
  });
  document.getElementById('schedSearchClear').addEventListener('click', () => {
    schedSearchInput.value = '';
    schedSearchInput.dispatchEvent(new Event('input'));
    schedSearchInput.focus();
  });

  // 일정이 많은 날짜 셀은 접어두고 "+N개 더보기"로 표시
  const expandedCells = new Set();
  const MAX_BADGES_PER_CELL = 5;

  function monthContainerId(year, month) {
    return `cal-${year}-${String(month).padStart(2, '0')}`;
  }

  function getSchedulePages() {
    const pages = [];
    for (let i = 0; i < MONTHS.length; i += MONTHS_PER_PAGE) pages.push(MONTHS.slice(i, i + MONTHS_PER_PAGE));
    return pages;
  }

  // ── Month card generator (현재 페이지에 해당하는 달만 카드 HTML로 생성) ──
  function renderScheduleCalendars() {
    const pages = getSchedulePages();
    const page = pages[currentPage];
    const container = document.getElementById('scheduleCalendars');

    container.innerHTML = page.map(({ year, month }) => `
      <div class="card sched-month">
        <h2>${year}년 ${month}월</h2>
        <table class="sched-table" id="${monthContainerId(year, month)}">
          <thead>
            <tr>
              <th class="sched-th-sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sched-th-sat">토</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>`).join('');

    page.forEach(({ year, month }) => renderCalendarMonth(monthContainerId(year, month), year, month));

    document.getElementById('schedPageLabel').textContent =
      `${page[0].year}년 ${page.map(({ month }) => `${month}월`).join(' - ')}`;
    document.getElementById('schedPrev').disabled = currentPage === 0;
    document.getElementById('schedNext').disabled = currentPage === pages.length - 1;

    renderCategoryLegend();
    renderTodaySummary();
  }

  document.getElementById('schedPrev').addEventListener('click', () => {
    if (currentPage === 0) return;
    currentPage--;
    renderScheduleCalendars();
    highlightToday();
  });
  document.getElementById('schedNext').addEventListener('click', () => {
    if (currentPage === getSchedulePages().length - 1) return;
    currentPage++;
    renderScheduleCalendars();
    highlightToday();
  });

  // ── Calendar grid renderer (계산만으로 달력 생성, 날짜 셀 하드코딩 없음) ──
  function renderCalendarMonth(containerId, year, month) {
    const tbody = document.querySelector(`#${containerId} tbody`);
    const firstWeekday = new Date(year, month - 1, 1).getDay(); // 0=일 ... 6=토
    const totalDays = new Date(year, month, 0).getDate();

    let html = '<tr>';
    for (let i = 0; i < firstWeekday; i++) html += '<td class="sched-empty"></td>';

    for (let day = 1; day <= totalDays; day++) {
      const weekday = (firstWeekday + day - 1) % 7;
      const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const numClass = weekday === 0 ? ' sched-sun-num' : weekday === 6 ? ' sched-sat-num' : '';
      const dayEvents = allEvents().filter(e => e.date === dateStr && eventVisible(e));
      const expanded = expandedCells.has(dateStr);
      // 미완료 일정은 항상 전부 표시 — 일정이 많은 날에는 완료 처리된 항목만 접음 (검색 중에는 접지 않음)
      const doneEvents = dayEvents.filter(e => doneSet.has(eventKey(e)));
      const collapseDone = !searchQuery && !expanded && dayEvents.length > MAX_BADGES_PER_CELL && doneEvents.length > 0;
      const visibleEvents = collapseDone ? dayEvents.filter(e => !doneSet.has(eventKey(e))) : dayEvents;
      let badges = visibleEvents.map(e => {
        const meta = metaFor(e.category);
        const key = eventKey(e);
        const doneClass = doneSet.has(key) ? ' sched-badge-done' : '';
        const tooltip = escapeAttr(badgeTooltip(e));
        return e.url
          ? `<a class="sched-badge${doneClass}" style="background:${meta.color}" href="${e.url}" target="_blank" rel="noopener" draggable="true" data-event-key="${escapeAttr(key)}" title="${tooltip}">${e.title}</a>`
          : `<span class="sched-badge sched-badge-plain${doneClass}" style="background:${meta.color}" draggable="true" data-event-key="${escapeAttr(key)}" title="${tooltip}">${e.title}</span>`;
      }).join('');
      if (collapseDone) {
        badges += `<button type="button" class="sched-more-btn" data-date="${dateStr}">✓ 완료 ${doneEvents.length}개 보기</button>`;
      } else if (expanded && dayEvents.length > MAX_BADGES_PER_CELL && doneEvents.length > 0) {
        badges += `<button type="button" class="sched-more-btn" data-date="${dateStr}">완료 항목 접기</button>`;
      }
      const maintTag = MAINTENANCE_DATES.has(dateStr) ? '<span class="sched-maint-tag" title="정기점검">점검</span>' : '';
      html += `<td data-date="${dateStr}"><div class="sched-daynum-row"><span class="sched-daynum${numClass}">${day}</span><button type="button" class="sched-add-btn" data-date="${dateStr}" title="이 날짜에 기록 추가">+</button></div>${maintTag}${badges}</td>`;
      if (weekday === 6 && day !== totalDays) html += '</tr><tr>';
    }

    const trailing = (firstWeekday + totalDays) % 7;
    if (trailing !== 0) for (let i = trailing; i < 7; i++) html += '<td class="sched-empty"></td>';
    html += '</tr>';

    tbody.innerHTML = html;
  }

  // ── Detail list renderer ──────────────────────────────────────
  function formatDateLabel(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const weekdayLabel = ['일', '월', '화', '수', '목', '금', '토'][new Date(y, m - 1, d).getDay()];
    return `${m}/${d}(${weekdayLabel})`;
  }

  function linkLabel(url) {
    const boardMatch = url.match(/_boardNo=(\d+)/);
    if (boardMatch) return boardMatch[1];
    if (url.includes('slack.com')) return 'Slack';
    return '링크';
  }

  function renderScheduleDetailTable() {
    const tbody = document.getElementById('scheduleDetailBody');
    const sorted = allEvents().filter(eventVisible).sort((a, b) => a.date.localeCompare(b.date));
    tbody.innerHTML = sorted.map(e => {
      const meta = metaFor(e.category);
      const key = eventKey(e);
      const isDone = doneSet.has(key);
      const link = e.url
        ? `<a class="board-link" href="${e.url}" target="_blank" rel="noopener">${linkLabel(e.url)}</a>`
        : '-';
      const deleteBtn = e.custom
        ? `<button type="button" class="custom-delete-btn" data-event-id="${escapeAttr(e.id)}">삭제</button>`
        : '';
      const editBtn = `<button type="button" class="event-edit-btn" data-event-key="${escapeAttr(key)}">수정</button>`;
      return `<tr class="${isDone ? 'row-done' : ''}">
        <td class="done-cell"><input type="checkbox" class="done-checkbox" data-key="${escapeAttr(key)}" ${isDone ? 'checked' : ''}></td>
        <td>${formatDateLabel(e.date)}</td>
        <td><span class="tag" style="background:${meta.color};color:#fff;">${meta.label}</span></td>

  // ── 배지 툴팁: 제목/상세 + "HH:MM UTC" 패턴이 있으면 KST 환산 추가 ──
  function badgeTooltip(e) {
    const base = e.detail ? `${e.title}\n${e.detail}` : e.title;
    const m = `${e.title} ${e.detail || ''}`.match(/(\d{1,2}):(\d{2})\s*UTC/);
    if (!m) return base;
    let h = parseInt(m[1], 10) + 9;
    const nextDay = h >= 24;
    if (nextDay) h -= 24;
    return `${base}\n⏰ KST ${nextDay ? '다음날 ' : ''}${String(h).padStart(2, '0')}:${m[2]}`;
  }

  // ── 오늘 & 다가오는 7일 요약 카드 ──────────────────────────
  function addDaysToDateStr(dateStr, days) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d + days)).toISOString().slice(0, 10);
  }

  function renderTodaySummary() {
    const el = document.getElementById('todaySummary');
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
    const endStr = addDaysToDateStr(todayStr, 7);
    const upcoming = allEvents()
      .filter(e => e.date >= todayStr && e.date <= endStr && eventVisible(e))
      .sort((a, b) => a.date.localeCompare(b.date));
    const rows = upcoming.map(e => {
      const meta = metaFor(e.category);
      const key = eventKey(e);
      const isToday = e.date === todayStr;
      const done = doneSet.has(key);
      return `<div class="sched-summary-row" data-event-key="${escapeAttr(key)}">
        <span class="sched-summary-date${isToday ? ' is-today' : ''}">${isToday ? '오늘' : formatDateLabel(e.date)}</span>

  // ── 캘린더(.ics) 내보내기: 폰/구글 캘린더에 등록해서 알림 받기 ──
  function icsEscape(text) {
    return String(text).replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
  }
  // RFC 5545 줄 접기 — 한글은 UTF-8 3바이트라 여유 있게 60자 단위로 접음
  function icsFold(line) {
    const chunks = [];
    for (let i = 0; i < line.length; i += 60) chunks.push(line.slice(i, i + 60));
    return chunks.join('\r\n ');
  }
  function icsHash(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
    return h.toString(16);
  }

  document.getElementById('icsExportBtn').addEventListener('click', () => {
    const stamp = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');
    const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//bdo-console-schedule//KO', 'CALSCALE:GREGORIAN'];
    allEvents().forEach(e => {
      const date = e.date.replace(/-/g, '');
      const desc = [e.detail, e.url].filter(Boolean).join('\n');
      lines.push('BEGIN:VEVENT');
      lines.push(`UID:${icsHash(eventKey(e))}-${date}@bdo-console-schedule`);
      lines.push(`DTSTAMP:${stamp}`);
      lines.push(`DTSTART;VALUE=DATE:${date}`);
      lines.push(icsFold(`SUMMARY:${icsEscape(`[${metaFor(e.category).label}] ${e.title}`)}`));
      if (desc) lines.push(icsFold(`DESCRIPTION:${icsEscape(desc)}`));
      // 당일 09:00(현지 시각)에 알림
      lines.push('BEGIN:VALARM', 'ACTION:DISPLAY', 'DESCRIPTION:일정 알림', 'TRIGGER:PT9H', 'END:VALARM');
      lines.push('END:VEVENT');
    });
    lines.push('END:VCALENDAR');
    downloadFile('bdo-console-schedule.ics', lines.join('\r\n'), 'text/calendar;charset=utf-8');
  });

  const SYNC_TOKEN_KEY = 'bdo-sync-github-token';

  const GIST_DESCRIPTION = 'BDO 콘솔 일정 동기화 데이터 (자동 생성 · 수정하지 마세요)';

  const syncStatusEl = document.getElementById('syncStatus');
  const syncConnectBtn = document.getElementById('syncConnectBtn');
  const syncNowBtn = document.getElementById('syncNowBtn');
  const syncDisconnectBtn = document.getElementById('syncDisconnectBtn');

  function isSyncConnected() { return !!localStorage.getItem(SYNC_TOKEN_KEY); }

  function setSyncStatus(state, err) {
    const now = new Date().toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul' });
    const map = {
      off:        '☁ 기기 간 동기화: 꺼짐',
      idle:       '☁ 동기화 준비됨',
      connecting: '☁ 연결 중…',
      saving:     '☁ 저장 중…',
      ok:         '✓ 동기화됨 · ' + now,
      error:      '⚠ 동기화 오류' + (err && err.status ? ' (HTTP ' + err.status + ')' : ''),
    };
    syncStatusEl.textContent = map[state] || map.off;
    syncStatusEl.dataset.state = state;
  }

  function updateSyncUI() {
    const connected = isSyncConnected();
    syncConnectBtn.style.display = connected ? 'none' : '';

  // 로컬 데이터가 바뀔 때마다 호출됨(각 save* 함수 끝) — 타임스탬프 갱신 + 자동 업로드 예약
  function onLocalDataChanged() {
    localStorage.setItem(SYNC_UPDATED_KEY, String(Date.now()));
    schedulePush();
  }

  function collectSyncData() {
    return {
      format: 'bdo-console-schedule-backup',
      version: 1,
      updatedAt: Number(localStorage.getItem(SYNC_UPDATED_KEY) || 0),
      done: [...doneSet],
      customEvents,
      customTasks,
      eventEdits,
      taskEdits,
    };
  }

  function persistAllLocal() {
    localStorage.setItem(DONE_STORAGE_KEY, JSON.stringify([...doneSet]));
    localStorage.setItem(CUSTOM_EVENTS_KEY, JSON.stringify(customEvents));
    localStorage.setItem(CUSTOM_TASKS_KEY, JSON.stringify(customTasks));
    localStorage.setItem(EVENT_EDITS_KEY, JSON.stringify(eventEdits));

  // 원격 데이터로 로컬을 통째로 교체(save*를 거치지 않아 재업로드 루프가 생기지 않음)
  function applySyncData(data) {
    doneSet = new Set(Array.isArray(data.done) ? data.done : []);
    customEvents = Array.isArray(data.customEvents) ? data.customEvents : [];
    customTasks = Array.isArray(data.customTasks) ? data.customTasks : [];
    eventEdits = (data.eventEdits && typeof data.eventEdits === 'object') ? data.eventEdits : {};
    taskEdits  = (data.taskEdits && typeof data.taskEdits === 'object') ? data.taskEdits : {};
    persistAllLocal();
    localStorage.setItem(SYNC_UPDATED_KEY, String(Number(data.updatedAt) || Date.now()));
    rerenderAll();
  }

  // 최초 연결 시에만 사용: 로컬과 원격을 합쳐(union) 어느 쪽 데이터도 잃지 않게 함
  function mergeRemoteIntoLocal(remote) {
    if (!remote) return;
    (remote.done || []).forEach(k => doneSet.add(k));
    const evIds = new Set(customEvents.map(e => e.id));
    (remote.customEvents || []).forEach(e => { if (e && e.id && !evIds.has(e.id)) customEvents.push(e); });
    const tkIds = new Set(customTasks.map(t => t.id));
    (remote.customTasks || []).forEach(t => { if (t && t.id && !tkIds.has(t.id)) customTasks.push(t); });
    Object.assign(eventEdits, remote.eventEdits || {});
    Object.assign(taskEdits, remote.taskEdits || {});
  }

  async function gistApi(path, options) {
    const token = localStorage.getItem(SYNC_TOKEN_KEY);
    const res = await fetch('https://api.github.com' + path, {
      ...(options || {}),
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        ...((options && options.headers) || {}),
      },
    });
    if (!res.ok) { const e = new Error('GitHub API ' + res.status); e.status = res.status; throw e; }
    return res.json();
  }

  async function findGistId() {
    const gists = await gistApi('/gists?per_page=100', { method: 'GET' });
    const found = gists.find(g => g.files && g.files[GIST_FILENAME]);
    return found ? found.id : null;
  }

  async function createGist() {
    const g = await gistApi('/gists', {
      method: 'POST',
      body: JSON.stringify({
        description: GIST_DESCRIPTION,
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(collectSyncData(), null, 2) } },
      }),
    });
    return g.id;
  }

  async function pullFromGist() {
    const gistId = localStorage.getItem(SYNC_GIST_KEY);
    if (!gistId) return null;
    const g = await gistApi('/gists/' + gistId, { method: 'GET' });
    const file = g.files && g.files[GIST_FILENAME];
    if (!file) return null;
    let content = file.content;
    if (file.truncated && file.raw_url) content = await fetch(file.raw_url).then(r => r.text());
    try { return JSON.parse(content); } catch { return null; }
  }

  async function pushToGist() {
    const gistId = localStorage.getItem(SYNC_GIST_KEY);
    if (!gistId) return;
    await gistApi('/gists/' + gistId, {
      method: 'PATCH',
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(collectSyncData(), null, 2) } } }),
    });
  }

  // 로컬/원격 중 더 최근(updatedAt) 것을 채택 — 체크 해제·삭제도 정상 반영됨
  async function reconcile(remote) {
    const localTs = Number(localStorage.getItem(SYNC_UPDATED_KEY) || 0);
    const remoteTs = remote ? Number(remote.updatedAt || 0) : -1;
    if (remote && remoteTs > localTs) applySyncData(remote);
    else if (localTs > remoteTs) await pushToGist();
  }

  let pushTimer = null;
  let pushing = false;
  function schedulePush() {
    if (!isSyncConnected() || !localStorage.getItem(SYNC_GIST_KEY)) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(runPush, 1500);
  }
  async function runPush() {
    if (!isSyncConnected() || !localStorage.getItem(SYNC_GIST_KEY)) return;
    if (pushing) { schedulePush(); return; }
    pushing = true;
    setSyncStatus('saving');
    try { await pushToGist(); setSyncStatus('ok'); }
    catch (e) { setSyncStatus('error', e); }
    finally { pushing = false; }
  }

  async function connectSync() {
    const token = prompt(
      'GitHub 토큰을 붙여넣으세요.\n\n' +
      '① github.com/settings/tokens/new 접속\n' +
      '② Note 아무거나 입력, 만료일 선택\n' +
      '③ 권한 중 "gist"만 체크 → Generate token\n' +
      '④ 생성된 토큰(ghp_...)을 복사해 여기 붙여넣기\n\n' +
      '※ 토큰은 이 브라우저에만 저장되고 공개되지 않습니다.'
    );
    if (!token) return;
    localStorage.setItem(SYNC_TOKEN_KEY, token.trim());
    setSyncStatus('connecting');
    try {
      let gistId = localStorage.getItem(SYNC_GIST_KEY) || await findGistId();
      if (gistId) {
        localStorage.setItem(SYNC_GIST_KEY, gistId);
        // 기존 Gist가 있으면 최초 연결에서는 로컬과 합쳐서 양쪽 데이터를 모두 보존
        const remote = await pullFromGist();
        mergeRemoteIntoLocal(remote);
        persistAllLocal();
        localStorage.setItem(SYNC_UPDATED_KEY, String(Date.now()));
        rerenderAll();
        await pushToGist();
      } else {
        // Gist가 없으면 현재 로컬 데이터로 새로 생성
        localStorage.setItem(SYNC_UPDATED_KEY, String(Date.now()));
        gistId = await createGist();
        localStorage.setItem(SYNC_GIST_KEY, gistId);
      }
      updateSyncUI();
      setSyncStatus('ok');
      alert('동기화가 연결되었습니다.\n다른 기기에서도 같은 GitHub 계정 토큰으로 "동기화 연결"을 누르면 데이터가 자동으로 맞춰집니다.');
    } catch (e) {
      setSyncStatus('error', e);
      localStorage.removeItem(SYNC_TOKEN_KEY);
      updateSyncUI();
      if (e.status === 401) alert('토큰이 올바르지 않거나 gist 권한이 없습니다. 다시 확인해 주세요.');
      else alert('연결에 실패했습니다: ' + e.message);
    }
  }

  async function syncNow() {
    if (!isSyncConnected()) return;
    setSyncStatus('connecting');
    try {
      let gistId = localStorage.getItem(SYNC_GIST_KEY) || await findGistId();
      if (gistId) localStorage.setItem(SYNC_GIST_KEY, gistId);
      const remote = await pullFromGist();
      await reconcile(remote);
      setSyncStatus('ok');
    } catch (e) { setSyncStatus('error', e); }
  }

  function disconnectSync() {
    if (!confirm('이 기기에서 동기화를 끊습니다.\n(로컬 데이터는 그대로 유지되고, 저장된 GitHub 토큰만 이 브라우저에서 삭제됩니다.)')) return;
    localStorage.removeItem(SYNC_TOKEN_KEY);
    localStorage.removeItem(SYNC_GIST_KEY);
    updateSyncUI();
  }

  async function bootstrapSync() {
    updateSyncUI();
    if (!isSyncConnected()) return;
    setSyncStatus('connecting');
    try {
      let gistId = localStorage.getItem(SYNC_GIST_KEY) || await findGistId();
      if (!gistId) { setSyncStatus('idle'); return; }
      localStorage.setItem(SYNC_GIST_KEY, gistId);
      const remote = await pullFromGist();
      await reconcile(remote);
      setSyncStatus('ok');
    } catch (e) { setSyncStatus('error', e); }
  }

  syncConnectBtn.addEventListener('click', connectSync);
  syncNowBtn.addEventListener('click', syncNow);
  syncDisconnectBtn.addEventListener('click', disconnectSync);

  // 탭이 열려 있는 동안 다른 기기의 변경을 주기적으로 반영(60초, 화면 보일 때만)
  setInterval(() => {
    if (document.visibilityState === 'visible' && isSyncConnected() && !pushing) {
      pullFromGist().then(reconcile).catch(() => {});
    }
  }, 60000);

  bootstrapSync();

  // ── Script definitions ─────────────────────────────────────
  const SCRIPTS = {
    korean:   { label: '한국어',      color: '#f9c74f', ranges: [[0xAC00,0xD7A3],[0x1100,0x11FF],[0x3130,0x318F],[0xA960,0xA97F],[0xD7B0,0xD7FF]] },
    japanese: { label: '일본어',      color: '#90be6d', ranges: [[0x3040,0x309F],[0x30A0,0x30FF],[0x31F0,0x31FF],[0xFF65,0xFF9F]] },
    cjk:      { label: '한자 (CJK)', color: '#f28482', ranges: [[0x4E00,0x9FFF],[0x3400,0x4DBF],[0xF900,0xFAFF]] },
    latin:    { label: '라틴어',      color: '#90caf9', ranges: [[0x0041,0x005A],[0x0061,0x007A],[0x00C0,0x024F],[0x1E00,0x1EFF]] },
    arabic:   { label: '아랍어',      color: '#ffb347', ranges: [[0x0600,0x06FF],[0x0750,0x077F],[0xFB50,0xFDFF],[0xFE70,0xFEFF]] },
    cyrillic: { label: '러시아어',    color: '#ce93d8', ranges: [[0x0400,0x04FF]] },
    thai:     { label: '태국어',      color: '#80cbc4', ranges: [[0x0E00,0x0E7F]] },
  };

  // Allowed scripts per base language selection
  const ALLOWED = {
    korean:   new Set(['korean']),
    japanese: new Set(['japanese', 'cjk']),
    chinese:  new Set(['cjk']),
    latin:    new Set(['latin']),
    arabic:   new Set(['arabic']),
    cyrillic: new Set(['cyrillic']),
    thai:     new Set(['thai']),
  };

  function getScript(cp) {
    for (const [key, info] of Object.entries(SCRIPTS)) {
      for (const [lo, hi] of info.ranges) {
        if (cp >= lo && cp <= hi) return key;
      }
    }
    return null;
  }

  function isNeutral(cp) {
    if (cp <= 0x0020) return true;
    if (cp >= 0x0021 && cp <= 0x002F) return true;
    if (cp >= 0x0030 && cp <= 0x0039) return true; // digits 0-9
    if (cp >= 0x003A && cp <= 0x0040) return true;
    if (cp >= 0x005B && cp <= 0x0060) return true;
    if (cp >= 0x007B && cp <= 0x007E) return true;
    if (cp >= 0x00A0 && cp <= 0x00BF) return true;
    if (cp >= 0x2000 && cp <= 0x206F) return true;
    if (cp >= 0x20A0 && cp <= 0x20CF) return true;
    if (cp >= 0x2100 && cp <= 0x2BFF) return true;
    if (cp >= 0x3000 && cp <= 0x303F) return true;
    if (cp >= 0xFE30 && cp <= 0xFE4F) return true;
    if (cp >= 0xFF00 && cp <= 0xFF0F) return true;
    if (cp >= 0xFF1A && cp <= 0xFF20) return true;
    if (cp >= 0xFF3B && cp <= 0xFF40) return true;
    if (cp >= 0xFF5B && cp <= 0xFF60) return true;
    if (cp >= 0x1F300) return true;
    return false;
  }

  // ── DOM refs ───────────────────────────────────────────────
  const inputText  = document.getElementById('inputText');
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const results    = document.getElementById('results');
  const badge      = document.getElementById('badge');
  const resultBody = document.getElementById('resultBody');
  const baseLangEl = document.getElementById('baseLang');
  const legendEl   = document.getElementById('legend');

  // 기본적으로 라틴(영어)을 허용하는 베이스 언어 목록
  const DEFAULT_LATIN_ALLOWED = new Set(['japanese', 'chinese', 'arabic', 'cyrillic', 'thai']);

  // ── Extra allow checkboxes ─────────────────────────────────
  const extraAllowWrap = document.getElementById('extraAllowWrap');

  function renderExtraAllow() {
    const base = baseLangEl.value;
    const baseAllowed = ALLOWED[base];
    const others = Object.entries(SCRIPTS).filter(([k]) => !baseAllowed.has(k));

    extraAllowWrap.innerHTML = `
      <div style="font-size:0.82rem;font-weight:600;color:#555;margin-bottom:6px;">추가로 허용할 언어 (체크 시 무시)</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;">
        ${others.map(([key, info]) => {
          const checked = (key === 'latin' && DEFAULT_LATIN_ALLOWED.has(base)) ? 'checked' : '';
          return `<label style="display:flex;align-items:center;gap:5px;font-size:0.85rem;cursor:pointer;">
            <input type="checkbox" class="extra-allow" value="${key}" ${checked}>
            <span class="legend-dot" style="background:${info.color};width:10px;height:10px;border-radius:2px;"></span>
            ${info.label}
          </label>`;
        }).join('')}
      </div>`;

    document.querySelectorAll('.extra-allow').forEach(cb =>
      cb.addEventListener('change', renderLegend)
    );
    renderLegend();
  }

  function getEffectiveAllowed() {
    const base = new Set(ALLOWED[baseLangEl.value]);
    document.querySelectorAll('.extra-allow:checked').forEach(cb => base.add(cb.value));
    return base;
  }

  // ── Legend ─────────────────────────────────────────────────
  function renderLegend() {
    const allowed = getEffectiveAllowed();
    const foreign = Object.entries(SCRIPTS).filter(([k]) => !allowed.has(k));
    legendEl.innerHTML = foreign.length
      ? `<div style="font-size:0.78rem;color:#888;margin-right:6px;">검사 대상:</div>` +
        foreign.map(([, info]) =>
          `<div class="legend-item">
            <div class="legend-dot" style="background:${info.color}"></div>
            <span>${info.label}</span>
          </div>`
        ).join('')
      : `<div style="font-size:0.78rem;color:#1d8348;">모든 언어가 허용 상태입니다.</div>`;
  }

  baseLangEl.addEventListener('change', renderExtraAllow);
  renderExtraAllow();

  // ── File upload ────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });

  function readFile(file) {
    if (file.name.endsWith('.docx')) {
      const r = new FileReader();
      r.onload = e => mammoth.extractRawText({ arrayBuffer: e.target.result })
        .then(res => { inputText.value = res.value; })
        .catch(() => alert('워드 파일을 읽는 데 실패했습니다.'));
      r.readAsArrayBuffer(file);
    } else {
      const r = new FileReader();
      r.onload = e => {
        const bytes = new Uint8Array(e.target.result);
        let text = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
        if (text.includes('')) text = new TextDecoder('windows-1252').decode(bytes);
        inputText.value = text;
      };
      r.readAsArrayBuffer(file);
    }
  }

  // ── Buttons ────────────────────────────────────────────────
  document.getElementById('btnCheck').addEventListener('click', () => {
    const text = inputText.value;
    if (!text.trim()) { alert('텍스트를 입력하거나 파일을 업로드해주세요.'); return; }
    analyse(text);
  });

  document.getElementById('btnClear').addEventListener('click', () => {
    inputText.value = '';
    fileInput.value = '';
    results.style.display = 'none';
  });

  // ── HTML strip ─────────────────────────────────────────────
  function maybeStripHtml(text) {
    if (!/<[a-z!][^>]*>/i.test(text)) return { text, isHtml: false };
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      doc.querySelectorAll('script, style').forEach(el => el.remove());
      return { text: extractNodeText(doc.body || doc.documentElement), isHtml: true };
    } catch {
      return { text, isHtml: false };
    }
  }

  function extractNodeText(node) {
    if (!node) return '';
    const BLOCK = new Set(['div','p','h1','h2','h3','h4','h5','h6','li','tr','td','section','article','header','footer','blockquote','dd','dt']);
    let out = '';
    for (const child of node.childNodes) {
      if (child.nodeType === 3) {
        out += child.textContent;
      } else if (child.nodeType === 1) {
        const tag = child.tagName.toLowerCase();
        if (tag === 'script' || tag === 'style') continue;
        if (tag === 'br') { out += '\n'; continue; }
        out += extractNodeText(child);
        if (BLOCK.has(tag)) out += '\n';
      }
    }
    return out;
  }

  // ── Analysis ───────────────────────────────────────────────
  function analyse(rawText) {
    const { text, isHtml } = maybeStripHtml(rawText);
    const allowed = getEffectiveAllowed();
    const lines = text.split('\n');
    const foundLines = [];
    const totalByScript = {};

    lines.forEach((line, idx) => {
      const { highlighted, byScript } = processLine(line, allowed);
      if (Object.keys(byScript).length > 0) {
        foundLines.push({ lineNum: idx + 1, highlighted, byScript });
        for (const [script, countMap] of Object.entries(byScript)) {
          if (!totalByScript[script]) totalByScript[script] = new Map();
          countMap.forEach((cnt, t) =>
            totalByScript[script].set(t, (totalByScript[script].get(t) || 0) + cnt)
          );
        }
      }
    });

    results.style.display = 'block';

    const htmlNotice = document.getElementById('htmlNotice');
    if (htmlNotice) htmlNotice.remove();
    if (isHtml) {
      const notice = document.createElement('p');
      notice.id = 'htmlNotice';
      notice.className = 'html-notice';
      notice.textContent = '※ HTML 소스가 감지되어 태그를 제거하고 텍스트만 검사했습니다.';
      resultBody.parentElement.insertBefore(notice, resultBody);
    }

    const newBadge = document.createElement('span');
    newBadge.id = 'badge';

    if (foundLines.length === 0) {
      newBadge.className = 'badge-ok';
      newBadge.textContent = '이상 없음';
      badge.replaceWith(newBadge);
      resultBody.innerHTML = '<p style="color:#1d8348;font-size:0.9rem;">다른 언어가 발견되지 않았습니다.</p>';
      return;
    }

    newBadge.className = 'badge-warn';
    newBadge.textContent = `${foundLines.length}줄에서 발견`;
    badge.replaceWith(newBadge);

    let html = `
      <table class="result-table">
        <thead>
          <tr>
            <th style="width:48px;">줄</th>
            <th style="width:55%;">내용 (이질 언어 강조)</th>
            <th>발견된 언어</th>
          </tr>
        </thead><tbody>`;

    foundLines.forEach(r => {
      const tagHtml = Object.entries(r.byScript).map(([script, countMap]) => {
        const { label, color } = SCRIPTS[script];
        const tokenTags = [...countMap.entries()].map(([t, cnt]) =>
          `<span class="tag tag-clickable" data-script="${script}" data-token="${escapeHtml(t)}" style="background:${color}44;border:1px solid ${color};">${escapeHtml(t)}${cnt > 1 ? `<span class="count-badge">×${cnt}</span>` : ''}</span>`
        ).join('');
        return `<div style="margin-bottom:4px;"><span style="font-size:0.75rem;color:#777;margin-right:4px;">${label}</span><div class="tag-list" style="margin-top:3px;">${tokenTags}</div></div>`;
      }).join('');

      html += `
        <tr>
          <td class="line-num">${r.lineNum}</td>
          <td class="line-content">${r.highlighted}</td>
          <td><div class="found-cell-inner">${tagHtml}</div></td>
        </tr>`;
    });

    html += `</tbody></table>`;

    // Summary
    html += `<div class="summary-section"><div style="font-size:0.82rem;font-weight:700;color:#555;margin-bottom:12px;">전체 발견 목록</div>`;
    for (const [script, tokens] of Object.entries(totalByScript)) {
      const { label, color } = SCRIPTS[script];
      html += `
        <div class="summary-group">
          <div class="summary-script-label">
            <span class="summary-dot" style="background:${color}"></span>${label}
          </div>
          <div class="tag-list">
            ${[...tokens.entries()].map(([t, cnt]) => `<span class="tag tag-clickable" data-script="${script}" data-token="${escapeHtml(t)}" style="background:${color}44;border:1px solid ${color};">${escapeHtml(t)}${cnt > 1 ? `<span class="count-badge">×${cnt}</span>` : ''}</span>`).join('')}
          </div>
        </div>`;
    }
    html += `</div>`;

    resultBody.innerHTML = html;
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function processLine(line, allowed) {
    const chars = [...line];
    let highlighted = '';
    const byScript = {};
    let i = 0;

    while (i < chars.length) {
      const cp = chars[i].codePointAt(0);

      if (isNeutral(cp)) {
        highlighted += escapeHtml(chars[i]);
        i++;
        continue;
      }

      const script = getScript(cp);

      if (!script || allowed.has(script)) {
        highlighted += escapeHtml(chars[i]);
        i++;
        continue;
      }

      // Collect consecutive chars of same foreign script
      let token = chars[i];
      i++;
      while (i < chars.length) {
        const ncp = chars[i].codePointAt(0);
        if (!isNeutral(ncp) && getScript(ncp) === script) {
          token += chars[i++];
        } else break;
      }

      const color = SCRIPTS[script].color;
      highlighted += `<mark data-script="${script}" data-token="${escapeHtml(token)}" style="background:${color};border-radius:3px;padding:1px 3px;" title="${SCRIPTS[script].label}">${escapeHtml(token)}</mark>`;
      if (!byScript[script]) byScript[script] = new Map();
      byScript[script].set(token, (byScript[script].get(token) || 0) + 1);
    }

    return { highlighted, byScript };
  }

  // ── Flash on tag click ─────────────────────────────────────
  resultBody.addEventListener('click', e => {
    const tag = e.target.closest('.tag-clickable');
    if (!tag) return;
    flashMarks(tag.dataset.script, tag.dataset.token);
  });

  function flashMarks(script, token) {
    const allMarks = [...resultBody.querySelectorAll('mark[data-script]')];
    const matches = allMarks.filter(m => m.dataset.script === script && m.dataset.token === token);
    const others  = allMarks.filter(m => !(m.dataset.script === script && m.dataset.token === token));

    allMarks.forEach(m => m.classList.remove('token-flash', 'token-dim'));

    requestAnimationFrame(() => {
      matches.forEach(m => m.classList.add('token-flash'));
      others.forEach(m => m.classList.add('token-dim'));
    });

    if (matches.length) matches[0].scrollIntoView({ behavior: 'smooth', block: 'center' });

    setTimeout(() => {
      allMarks.forEach(m => m.classList.remove('token-flash', 'token-dim'));
    }, 1200);
  }

  // ── Deploy info ────────────────────────────────────────────
  const deployInfoEl = document.getElementById('deployInfo');
  const pageModified = new Date(document.lastModified);
  deployInfoEl.textContent =
    '최신 배포: ' + pageModified.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

  // GitHub의 최신 커밋과 비교해서 지금 보고 있는 페이지가 옛 버전이면 경고 표시
  fetch('https://api.github.com/repos/rladntls94-tech/korean-checker/commits/main')
    .then(r => (r.ok ? r.json() : null))
    .then(c => {
      if (!c || !c.commit) return;
      deployInfoEl.textContent += ` · 최신 커밋 ${c.sha.slice(0, 7)}`;
      const commitDate = new Date(c.commit.committer.date);
      // Pages 배포 지연을 감안해 3분 이상 차이날 때만 경고
      if (commitDate - pageModified > 3 * 60 * 1000) {
        const warn = document.createElement('span');
        warn.className = 'deploy-update-warn';
        warn.textContent = '새 버전이 배포되었습니다 — 클릭해서 새로고침';
        warn.addEventListener('click', () => location.reload());
        deployInfoEl.appendChild(warn);
      }
    })
    .catch(() => {});

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
